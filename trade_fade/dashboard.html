<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelly Bot — P&L Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px; border-bottom: 1px solid #1a1a2e;
  }
  .header h1 { font-size: 18px; color: #4fc3f7; }
  .header .balance { font-size: 22px; font-weight: 700; margin-left: 16px; }
  .header .balance.positive { color: #00c853; }
  .header .balance.negative { color: #ff1744; }
  .header .balance.neutral { color: #aaa; }
  .header .status { font-size: 13px; color: #666; }
  .header .status.live { color: #00c853; }

  .controls {
    display: flex; gap: 8px; padding: 12px 24px; border-bottom: 1px solid #1a1a2e;
    flex-wrap: wrap; align-items: center;
  }
  .controls button {
    background: #1a1a2e; color: #aaa; border: 1px solid #2a2a3e;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
    font-family: inherit; transition: all 0.2s;
  }
  .controls button:hover { background: #2a2a3e; color: #fff; }
  .controls button.active { background: #1a2a3a; color: #4fc3f7; border-color: #4fc3f7; }
  .controls .sep { width: 1px; height: 24px; background: #2a2a3e; }
  .controls label { font-size: 12px; color: #666; margin-left: 8px; }

  .stats-bar {
    display: flex; gap: 24px; padding: 14px 24px;
    border-bottom: 1px solid #1a1a2e; flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 16px; font-weight: 600; }
  .stat .value.positive { color: #00c853; }
  .stat .value.negative { color: #ff1744; }
  .stat .value.neutral { color: #aaa; }

  #chart-container { width: 100%; height: 420px; padding: 0 24px; }

  .tables { display: flex; gap: 16px; padding: 16px 24px; flex-wrap: wrap; }
  .table-wrap { flex: 1; min-width: 400px; }
  .table-wrap h3 { font-size: 13px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #555; padding: 6px 8px; border-bottom: 1px solid #1a1a2e; font-weight: 500; }
  td { padding: 5px 8px; border-bottom: 1px solid #0f0f1a; }
  tr:hover td { background: #0f0f1a; }
  .win { color: #00c853; }
  .loss { color: #ff1744; }
  .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .tag.early { background: #1a2a3a; color: #4fc3f7; }
  .tag.fade { background: #2a1a3a; color: #ce93d8; }
  .tag.pending { background: #2a2a1a; color: #ffd54f; }
  .tag.filled { background: #1a3a1a; color: #00c853; }
  .gate-info { font-size: 10px; color: #555; }
</style>
</head>
<body>

<div class="header">
  <h1>KELLY BOT</h1>
  <span class="balance neutral" id="balance">$100.00</span>
  <div class="status" id="status">Loading...</div>
</div>

<div class="controls">
  <button class="active" data-view="cumulative">Cumulative P&L</button>
  <button data-view="pertrade">Per Trade</button>
  <div class="sep"></div>
  <label>Auto-refresh:
    <select id="refresh-interval" style="background:#1a1a2e;color:#aaa;border:1px solid #2a2a3e;padding:3px 6px;font-family:inherit;font-size:12px;border-radius:3px;">
      <option value="0">Off</option>
      <option value="10" selected>10s</option>
      <option value="30">30s</option>
      <option value="60">60s</option>
    </select>
  </label>
  <button id="refresh-btn" style="margin-left:auto;">&#8635; Refresh Now</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div id="chart-container"></div>

<div class="tables">
  <div class="table-wrap" style="min-width:100%;margin-bottom:8px;">
    <h3>Open Positions</h3>
    <table id="positions-table">
      <thead><tr><th>Status</th><th>Ticker</th><th>Strategy</th><th>Side</th><th>Price</th><th>Qty</th><th>Wagered</th><th>Kelly</th><th>Entry Time</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<div class="tables">
  <div class="table-wrap">
    <h3>Recent Settlements</h3>
    <table id="recent-table">
      <thead><tr><th>Time</th><th>Ticker</th><th>Strategy</th><th>Side</th><th>Price</th><th>Qty</th><th>Wagered</th><th>Kelly</th><th>Result</th><th>P&L</th><th>Balance</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const DATA_URL = './data/fade_history.jsonl';
const STATE_URL = './data/fade_state.json';

let allTrades = [];
let stateData = {};
let currentView = 'cumulative';
let chart, mainSeries;
let refreshTimer = null;

function initChart() {
  const container = document.getElementById('chart-container');
  chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#0a0a0f' }, textColor: '#666', fontFamily: "'SF Mono', monospace", fontSize: 11 },
    grid: { vertLines: { color: '#111118' }, horzLines: { color: '#111118' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#1a1a2e' },
    timeScale: { borderColor: '#1a1a2e', timeVisible: true, secondsVisible: false },
    handleScroll: true, handleScale: true,
  });
  mainSeries = chart.addCandlestickSeries({
    upColor: '#00c853', downColor: '#ff1744',
    borderUpColor: '#00c853', borderDownColor: '#ff1744',
    wickUpColor: '#00c85388', wickDownColor: '#ff174488',
    priceFormat: { type: 'custom', formatter: v => (v >= 0 ? '+' : '') + v.toFixed(0) + 'c' },
  });

  new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth, height: 420 });
  }).observe(container);
}

async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    const text = await resp.text();
    allTrades = text.trim().split('\n').filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch { return null; }
    }).filter(Boolean);

    allTrades.sort((a, b) => (a.settled_time || '').localeCompare(b.settled_time || ''));
    updateAll();
    document.getElementById('status').textContent = `${allTrades.length} trades loaded - ${new Date().toLocaleTimeString()}`;
    document.getElementById('status').className = 'status live';
  } catch (e) {
    document.getElementById('status').textContent = 'No data yet (waiting for first settlement)';
    document.getElementById('status').className = 'status';
  }

  // Load state (open positions)
  try {
    const stateResp = await fetch(STATE_URL + '?t=' + Date.now());
    stateData = await stateResp.json();
    updatePositionsTable();
    // Update balance headline
    const bal = (stateData.balance || 10000) / 100;
    const balEl = document.getElementById('balance');
    balEl.textContent = '$' + bal.toFixed(2);
    balEl.className = 'balance ' + (bal > 100 ? 'positive' : bal < 100 ? 'negative' : 'neutral');
  } catch (e) {
    stateData = {};
    updatePositionsTable();
  }
}

function updateAll() {
  updateStats(allTrades);
  updateChart(allTrades);
  updateRecentTable(allTrades);
}

function updateStats(trades) {
  if (!trades.length) {
    document.getElementById('stats-bar').innerHTML = stat('Status', 'Waiting for data', null);
    return;
  }
  const totalPnl = trades.reduce((s, t) => s + (t.pnl_cents || 0), 0);
  const wins = trades.filter(t => t.won).length;
  const losses = trades.length - wins;
  const winRate = trades.length > 0 ? (wins / trades.length * 100) : 0;
  const avgPnl = trades.length > 0 ? totalPnl / trades.length : 0;
  const avgWin = wins > 0 ? trades.filter(t => t.won).reduce((s, t) => s + t.pnl_cents, 0) / wins : 0;
  const avgLoss = losses > 0 ? trades.filter(t => !t.won).reduce((s, t) => s + t.pnl_cents, 0) / losses : 0;

  const bar = document.getElementById('stats-bar');
  bar.innerHTML = [
    stat('Total P&L', fmt(totalPnl) + 'c', totalPnl),
    stat('Dollar P&L', '$' + (totalPnl / 100).toFixed(2), totalPnl),
    stat('Trades', trades.length, null),
    stat('Win Rate', winRate.toFixed(1) + '%', winRate > 15 ? 1 : -1),
    stat('Record', `${wins}W / ${losses}L`, null),
    stat('Avg Win', fmt(avgWin) + 'c', 1),
    stat('Avg Loss', fmt(avgLoss) + 'c', -1),
    stat('Reward/Risk', wins > 0 && losses > 0 ? (Math.abs(avgWin / avgLoss)).toFixed(1) + 'x' : '-', null),
  ].join('');
}

function stat(label, value, sentiment) {
  const cls = sentiment === null ? 'neutral' : sentiment > 0 ? 'positive' : sentiment < 0 ? 'negative' : 'neutral';
  return `<div class="stat"><span class="label">${label}</span><span class="value ${cls}">${value}</span></div>`;
}

function fmt(v) { return (v >= 0 ? '+' : '') + Math.round(v); }

function updateChart(trades) {
  if (!trades.length) { mainSeries.setData([]); return; }

  chart.removeSeries(mainSeries);
  mainSeries = chart.addCandlestickSeries({
    upColor: '#00c853', downColor: '#ff1744',
    borderUpColor: '#00c853', borderDownColor: '#ff1744',
    wickUpColor: '#00c85388', wickDownColor: '#ff174488',
    priceFormat: { type: 'custom', formatter: v => (v >= 0 ? '+' : '') + v.toFixed(0) + 'c' },
  });

  if (currentView === 'cumulative') {
    const BUCKET_S = 15 * 60;
    let cumPnl = 0;
    const cumPoints = trades.map(t => {
      cumPnl += (t.pnl_cents || 0);
      return { ts: Math.floor(new Date(t.settled_time).getTime() / 1000), cum: cumPnl };
    });

    const buckets = new Map();
    for (const p of cumPoints) {
      const bStart = Math.floor(p.ts / BUCKET_S) * BUCKET_S;
      if (!buckets.has(bStart)) buckets.set(bStart, []);
      buckets.get(bStart).push(p.cum);
    }

    let prevClose = 0;
    const candles = [];
    for (const bStart of [...buckets.keys()].sort((a, b) => a - b)) {
      const vals = buckets.get(bStart);
      candles.push({ time: bStart, open: prevClose, high: Math.max(prevClose, ...vals), low: Math.min(prevClose, ...vals), close: vals[vals.length - 1] });
      prevClose = vals[vals.length - 1];
    }
    mainSeries.setData(candles);
  } else {
    const data = trades.map(t => {
      const ts = Math.floor(new Date(t.settled_time).getTime() / 1000);
      const pnl = t.pnl_cents || 0;
      return { time: ts, open: 0, close: pnl, high: Math.max(0, pnl), low: Math.min(0, pnl) };
    });
    const deduped = [];
    for (const d of data) {
      if (deduped.length && deduped[deduped.length - 1].time >= d.time) d.time = deduped[deduped.length - 1].time + 1;
      deduped.push(d);
    }
    mainSeries.setData(deduped);
  }

  mainSeries.createPriceLine({ price: 0, color: '#333', lineWidth: 1, lineStyle: 2, axisLabelVisible: false });
  chart.timeScale().fitContent();
}

function updatePositionsTable() {
  const tbody = document.querySelector('#positions-table tbody');
  const pending = stateData.pending_orders || {};
  const filled = stateData.filled_positions || {};

  const positions = [];
  for (const [ticker, pos] of Object.entries(pending)) {
    positions.push({ ...pos, _status: 'pending' });
  }
  for (const [ticker, pos] of Object.entries(filled)) {
    positions.push({ ...pos, _status: 'filled' });
  }

  if (!positions.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="color:#555;text-align:center;padding:12px;">No open positions</td></tr>';
    return;
  }

  tbody.innerHTML = positions.map(p => {
    const statusTag = p._status === 'pending' ? '<span class="tag pending">PENDING</span>' : '<span class="tag filled">FILLED</span>';
    const series = (p.series || '').replace('15M', '').replace('KX', '');
    const strat = p.strategy === 'early_window' ? '<span class="tag early">EARLY</span>' : '<span class="tag fade">FADE</span>';
    const wagered = ((p.buy_price || 0) * (p.contracts || 0) / 100).toFixed(2);
    const kellyInfo = `f=${(p.kelly_f || 0).toFixed(2)} e=${(p.kelly_edge || 0).toFixed(3)}`;
    const entryTime = p.order_time ? new Date(p.order_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '-';
    return `<tr>
      <td>${statusTag}</td>
      <td>${series}</td>
      <td>${strat}</td>
      <td>${(p.buy_side || '').toUpperCase()}</td>
      <td>${p.buy_price}c</td>
      <td>x${p.contracts}</td>
      <td>$${wagered}</td>
      <td class="gate-info">${kellyInfo}</td>
      <td>${entryTime}</td>
    </tr>`;
  }).join('');
}

function updateRecentTable(trades) {
  const tbody = document.querySelector('#recent-table tbody');
  const recent = trades.slice(-25).reverse();
  tbody.innerHTML = recent.map(t => {
    const time = new Date(t.settled_time).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const series = (t.series || '').replace('15M', '').replace('KX', '');
    const strat = t.strategy === 'early_window' ? '<span class="tag early">EARLY</span>' : '<span class="tag fade">FADE</span>';
    const pnl = t.pnl_cents || 0;
    const cls = t.won ? 'win' : 'loss';
    const wagered = ((t.buy_price || 0) * (t.contracts || 0) / 100).toFixed(2);
    const kellyInfo = `f=${(t.kelly_f || 0).toFixed(2)} p=${(t.kelly_win_prob || 0).toFixed(0)}%`;
    const balAfter = t.balance_after ? '$' + (t.balance_after / 100).toFixed(2) : '-';
    const balCls = t.balance_after && t.balance_after > 10000 ? 'win' : t.balance_after && t.balance_after < 10000 ? 'loss' : '';
    return `<tr>
      <td>${time}</td>
      <td>${series}</td>
      <td>${strat}</td>
      <td>${(t.buy_side || '').toUpperCase()}</td>
      <td>${t.buy_price}c</td>
      <td>x${t.contracts}</td>
      <td>$${wagered}</td>
      <td class="gate-info">${kellyInfo}</td>
      <td class="${cls}">${t.won ? 'WIN' : 'LOSS'}</td>
      <td class="${cls}">${pnl >= 0 ? '+' : ''}${pnl}c</td>
      <td class="${balCls}">${balAfter}</td>
    </tr>`;
  }).join('');
}

// Controls
document.querySelectorAll('.controls button[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    updateAll();
  });
});

document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('refresh-interval').addEventListener('change', (e) => {
  if (refreshTimer) clearInterval(refreshTimer);
  const sec = parseInt(e.target.value);
  if (sec > 0) refreshTimer = setInterval(loadData, sec * 1000);
});

initChart();
loadData();
refreshTimer = setInterval(loadData, 10000);
</script>
</body>
</html>
